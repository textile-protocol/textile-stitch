[workspace]
members = ["cargo:."]

[dist]
cargo-dist-version = "0.32.0"
ci = "github"
installers = ["shell", "powershell"]
targets = [
  "aarch64-apple-darwin",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "x86_64-unknown-linux-gnu",
  "x86_64-pc-windows-msvc",
]
install-path = "CARGO_HOME"
hosting = "github"
install-updater = false
# Build stitch-setup (needs the gui feature) alongside the stitch bot binary.
features = ["gui"]
# Linux double-click launcher goes in the archive. The macOS app ships prebuilt
# as Stitch.app.zip via the macos-app.yml workflow, so Info.plist/make-app.sh are
# build-time inputs, not user-facing archive files.
include = [
  "packaging/linux/stitch.desktop",
  "packaging/linux/stitch.png",
]

[dist.dependencies.apt]
libgtk-3-dev = '*'
libxcb-render0-dev = '*'
libxcb-shape0-dev = '*'
libxcb-xfixes0-dev = '*'
libxkbcommon-dev = '*'
libssl-dev = '*'

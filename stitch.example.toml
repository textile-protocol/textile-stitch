# Textile Stitch — example config.
# The wallet key is NOT here; export STITCH_PRIVATE_KEY in the environment.

chain_id = 8453                     # Base
rpc_url = "https://mainnet.base.org"
indexer_url = "https://api.textilecredit.com"
permit2 = "0x000000000022D473030F116dDEE9F6B43aC78BA3"
reactor = "0xEb5A29F869FF084B3Fce18d3487a38A56feDC59E"  # SETTLEMENT_V3_FILLER_REACTOR (Base)
# Subgraph for blue-leg discovery (OPEN positions). Omit to run green-leg only.
subgraph_url = "https://api.textilecredit.com/subgraph?chainId={...}"
tick_interval_secs = 5

# Default price feed: used by any pool that doesn't set its own `feed_url`.
[feed]
url = "https://your-feed.example/cngn-usdt"
# The cNGN feed serves a Bybit-corrected center that re-samples every 3 min, and
# its `timestamp` is the sample's observation time (not request time), so it ages
# between ticks. Keep this above the sample cadence or the bot rejects fresh
# quotes as stale. 900s matches the feed's own 15-min freshness bound (past which
# /api/price falls back to a fresh Monierate mid), so the feed, not the bot,
# enforces staleness.
staleness_secs = 900

# One block per corridor you serve. Add more [[pools]] for other pairs/chains.
# Pairs with different prices (cNGN, COPM, …) MUST each set `feed_url` — one
# shared feed can't price them all.
[[pools]]
collateral = "0xcngn0000000000000000000000000000000000c0"  # cNGN (soft asset)
collateral_decimals = 6
debt = "0xusdc0000000000000000000000000000000000d7"        # USDC on Base (stable)
debt_decimals = 6
# feed_url = "https://your-feed.example/cngn-usdc"  # per-pool price (optional)

# Two-sided market making. Each side is independent — set a spread + a size to
# run it; omit a side to skip it. Express the spread however you prefer:
#   *_offset_bps  — relative, in basis points off the mid
#   *_offset_abs  — absolute, in the soft-per-stable price (collateral per debt,
#                   e.g. cNGN/USDT, COPM/USDT — currency-agnostic)
# Set one per side; if both are set, bps wins.

# Buy low: bid below the mid, paying USDC for cNGN.
buy_offset_bps = 150                # 1.5% below the mid   (or: buy_offset_abs = 2.0)
buy_total_liquidity_debt = "max"          # quote all currently funded USDC
buy_min_slice_debt = "10000000"           # 10 USDC smallest slice (6dp)
buy_max_orders = 40

# Sell high: ask above the mid, selling cNGN for USDC. Needs cNGN inventory +
# a Permit2 approval on cNGN.
sell_offset_abs = 2.0                       # 2 soft/stable above the mid (or: sell_offset_bps = 150)
sell_total_liquidity_collateral = "max"        # quote all currently funded cNGN
sell_min_slice_debt = "10000000"                # 10 USDC-equivalent smallest slice
sell_max_orders = 40

ttl_secs = 120
# repost_lead_secs = 60   # repost each side this many secs before its order
                          # expires, so the new ladder overlaps the old one and
                          # the book never blanks between reposts. Capped at
                          # ttl/2, so keep ttl_secs >= 2 x this. Defaults to 60.
refresh_threshold_bps = 10  # re-quote a side when its price moves >0.10%

# Taker leg: fill users' RESTING LIMIT ORDERS when their price crosses your
# own quote — a user selling the soft asset fills at or below your bid, a user
# buying it at or above your ask. Priced by the side spreads above (a side
# without a spread is never taken), plus the reactor's native fee (read
# on-chain) and gas. Costs gas per fill; profit lands as inventory.
limit_taker_enabled = true
# limit_taker_min_profit_debt = "50000"  # skip fills clearing < 0.05 USDC (6dp)
# limit_taker_max_orders = 10            # per executeBatch

# ----- Blue leg (auction closer). Set these to also close this pool's
# positions via pool.fill(); omit them to run this pool green-only. The
# floor/buffer/window mirror the pool's on-chain auction params. -----
closer_pool = "0x0000000000000000000000000000000000000000"  # SettlementPool
floor_ray = "500000000000000000000000"       # 0.05% opening rate (RAY)
buffer_ray = "20000000000000000000000000"    # 2% decaying buffer (RAY)
window_secs = 432000                          # 5-day auction window
min_margin_collateral = "0"                   # accept any positive net margin
max_positions_per_fill = 10                   # close up to N from the FIFO front
discover_first = 200                          # candidates pulled per tick
skip_past_window = true                       # leave fully-decayed positions

# ----- Signer / wallet backend. Omit this whole section to use the local
# hotwallet (the default, unchanged): the bot signs with STITCH_PRIVATE_KEY /
# STITCH_PRIVATE_KEY_FILE from the environment. Set [signer] to use an MPC wallet
# instead. All secrets stay in the environment, never in this file. Each side of
# every signature (the EIP-712 limit orders and the on-chain fill/approve txs)
# goes through whichever signer you pick here; you pick one backend for the whole
# bot. See ADVANCED.md for the MPC wallet details and the MPCVault sidecar setup.
#
# Local hotwallet (same as omitting [signer]):
# [signer]
# provider = "local"
#
# Turnkey (TEE-backed MPC, no extra infra, one synchronous API call per
# signature, runs inside the bot binary). Secrets in the env:
# TURNKEY_API_PUBLIC_KEY (plain), TURNKEY_API_PRIVATE_KEY /
# TURNKEY_API_PRIVATE_KEY_FILE (secret).
# [signer]
# provider = "turnkey"
# organization_id  = "<turnkey org id>"
# sign_with        = "0x<wallet account address or private key id>"
# operator_address = "0x<the EVM address sign_with resolves to>"
# api_base_url     = "https://api.turnkey.com"   # optional, this is the default
# max_concurrent_signs = 8                        # optional
#
# MPCVault (needs the client-signer sidecar, one per operator; see ADVANCED.md).
# Secret in the env: MPCVAULT_API_TOKEN / MPCVAULT_API_TOKEN_FILE.
# [signer]
# provider = "mpcvault"
# api_base_url         = "https://api.mpcvault.com"   # optional, default
# vault_uuid           = "<mpcvault vault uuid>"
# client_signer_pubkey = "ssh-ed25519 AAAA... "       # the sidecar's public key
# operator_address     = "0x<the vault wallet EVM address>"
# callback_listen_addr = "0.0.0.0:8088"   # optional, default; where the bot serves the approval callback
# poll_timeout_secs    = 30                # optional
# max_concurrent_signs = 4                 # optional

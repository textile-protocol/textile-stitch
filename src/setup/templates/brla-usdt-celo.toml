# Textile Stitch — BRLA/USDT on Celo (chain 42220).
# The wallet key is NOT here; export STITCH_PRIVATE_KEY (or STITCH_PRIVATE_KEY_FILE).
#
# A single [[pools]] block quotes BOTH swap directions: the buy side pays USDT
# for BRLA (USDT -> BRLA) and the sell side sells BRLA for USDT (BRLA -> USDT).

chain_id        = 42220                                 # Celo mainnet
rpc_url         = "https://42220.rpc.thirdweb.com/e76584a65c9e8f40c6eed2da4ca46559"
indexer_url     = "https://api.textilecredit.com"
permit2         = "0x000000000022D473030F116dDEE9F6B43aC78BA3"  # canonical Permit2 (same on every chain)
reactor         = "0xFd993A9A065d628822c4d2D8Bc20e92bED9Ae49f"  # Celo reactor
tick_interval_secs = 5

# Textile's own price endpoint. Returns { price, timestamp } where price is
# debt-per-collateral (USDT per BRLA, ~0.18). The BRLA market rate behind it
# refreshes on a 10-minute cron (push-brla-usdt-oracle), so staleness must clear
# one missed cycle.
[feed]
url            = "https://api.textilecredit.com/price?chainId=42220&pair=brla-usdt"
staleness_secs = 900

[[pools]]
collateral = "0xFECB3F7c54E2CAAE9dC6Ac9060A822D47E053760"  # BRLA (soft asset, 18dp)
collateral_decimals = 18
debt = "0x48065fbBE25f71C9282ddf5e1cD6D6A887483D5e"        # USDT on Celo (stable, 6dp)
debt_decimals = 6

# Buy low: bid below the mid, paying USDT for BRLA. Funds USDT + Permit2 on USDT.
buy_offset_bps = 1                                # 1 bps below mid
buy_total_liquidity_debt = "max"                  # quote all funded USDT
buy_min_slice_debt = "10000000"                   # 10 USDT smallest slice (6dp)
buy_max_orders = 40

# Sell high: ask above the mid, selling BRLA for USDT. Funds BRLA + Permit2 on BRLA.
sell_offset_bps = 1                               # 1 bps above mid
sell_total_liquidity_collateral = "max"           # quote all funded BRLA
sell_min_slice_debt = "10000000"                  # 10 USDT-equivalent slice (6dp)
sell_max_orders = 40

ttl_secs = 120
refresh_threshold_bps = 10                        # re-quote when price moves >0.10%

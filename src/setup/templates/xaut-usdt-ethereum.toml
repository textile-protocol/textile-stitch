# Textile Stitch — XAUt/USDT on Ethereum (chain 1).
# The wallet key is NOT here; export STITCH_PRIVATE_KEY (or STITCH_PRIVATE_KEY_FILE).
#
# A single [[pools]] block quotes BOTH swap directions: the buy side pays USDT
# for XAUt (USDT -> XAUt) and the sell side sells XAUt for USDT (XAUt -> USDT).

chain_id        = 1                                    # Ethereum mainnet
rpc_url         = "https://ethereum-rpc.publicnode.com" # free public Ethereum RPC; swap for your own if you have one
indexer_url     = "https://api.textilecredit.com"
permit2         = "0x000000000022D473030F116dDEE9F6B43aC78BA3"  # canonical Permit2 (same on every chain)
reactor         = "0x26a1aedaa26affc4fd9f910acfca754a31bc43c6"  # SETTLEMENT_V3_FILLER_REACTOR (Ethereum)
tick_interval_secs = 5

# Textile's own price endpoint. Returns { price, timestamp } where price is
# debt-per-collateral (USDT per XAUt, ~3300). The XAUt market rate behind it
# refreshes on a ~1-minute Pyth cron, so staleness must clear one missed cycle.
[feed]
url            = "https://api.textilecredit.com/price?chainId=1&pair=xaut-usdt"
staleness_secs = 900

[[pools]]
collateral = "0x68749665FF8D2d112Fa859AA293F07A622782F38"  # XAUt (soft asset, 6dp)
collateral_decimals = 6
debt = "0xdAC17F958D2ee523a2206206994597C13D831ec7"        # USDT on Ethereum (stable, 6dp)
debt_decimals = 6

# Buy low: bid below the mid, paying USDT for XAUt. Funds USDT + Permit2 on USDT.
buy_offset_bps = 1                                # 1 bps below mid
buy_total_liquidity_debt = "max"                  # quote all funded USDT
buy_min_slice_debt = "10000000"                   # 10 USDT smallest slice (6dp)
buy_max_orders = 40

# Sell high: ask above the mid, selling XAUt for USDT. Funds XAUt + Permit2 on XAUt.
sell_offset_bps = 1                               # 1 bps above mid
sell_total_liquidity_collateral = "max"           # quote all funded XAUt
sell_min_slice_debt = "10000000"                  # 10 USDT-equivalent slice (6dp)
sell_max_orders = 40

ttl_secs = 120
refresh_threshold_bps = 10                        # re-quote when price moves >0.10%

# Textile Stitch — cNGN/USDT on BSC (production).
# The wallet key is NOT here; export STITCH_PRIVATE_KEY (or STITCH_PRIVATE_KEY_FILE).

chain_id        = 56                                    # BNB Smart Chain mainnet
rpc_url         = "https://56.rpc.thirdweb.com/e76584a65c9e8f40c6eed2da4ca46559"
indexer_url     = "https://api.textilecredit.com"
permit2         = "0x000000000022D473030F116dDEE9F6B43aC78BA3"
reactor         = "0xe03261c0436DB575F92F09EdDF3591E2566B7D97"  # SETTLEMENT_V3_FILLER_REACTOR (BSC)
subgraph_url    = "https://api.textilecredit.com/subgraph?chainId=56"
tick_interval_secs = 5

# Textile's own price endpoint. Returns { price, timestamp } where price is
# debt-per-collateral (USDT per cNGN, e.g. ~0.000728). The market rate behind it
# refreshes on a ~10-minute cron, so staleness must clear one missed cycle.
[feed]
url            = "https://api.textilecredit.com/price?chainId=56&pair=cngn-usdt"
staleness_secs = 900

[[pools]]
collateral = "0xa8AEA66B361a8d53e8865c62D142167Af28Af058"  # cNGN (soft asset, 6dp)
collateral_decimals = 6
debt = "0x55d398326f99059fF775485246999027B3197955"        # USDT on BSC (stable, 18dp)
debt_decimals = 18

# Buy low: bid below the mid, paying USDT for cNGN. Funds USDT + Permit2 on USDT.
buy_offset_bps = 1                              # 1 bps below mid
buy_total_liquidity_debt = "max"                  # quote all funded USDT
buy_min_slice_debt = "10000000000000000000"       # 10 USDT smallest slice (18dp)
buy_max_orders = 40

# Sell high: ask above the mid, selling cNGN for USDT. Funds cNGN + Permit2 on cNGN.
sell_offset_bps = 1                             # 1 bps above mid
sell_total_liquidity_collateral = "max"           # quote all funded cNGN
sell_min_slice_debt = "10000000000000000000"      # 10 USDT-equivalent slice (18dp)
sell_max_orders = 40

ttl_secs = 120
refresh_threshold_bps = 10                        # re-quote when price moves >0.10%

# ----- Blue leg (auction closer) for the cNGN/USDT pool -----
closer_pool = "0xB0CA09c4685371CB48caF48860F2baBb110F75ae"  # SETTLEMENT_V3_CNGN_USDT_POOL
floor_ray = "500000000000000000000000"            # 0.05% opening rate (RAY)
buffer_ray = "20000000000000000000000000"         # 2% decaying buffer (RAY)
window_secs = 432000                              # 5-day auction window
min_margin_collateral = "0"                       # accept any positive net margin
max_positions_per_fill = 10
discover_first = 200
skip_past_window = true
